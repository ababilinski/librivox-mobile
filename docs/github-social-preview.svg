<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">LibriVox Mobile repository social preview</title>
  <desc id="desc">Social preview graphic for LibriVox Mobile showing the app name, free listening message, and three Android app screenshots.</desc>
  <defs>
    <linearGradient id="heroShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#151110" stop-opacity="0.94"/>
      <stop offset="0.46" stop-color="#151110" stop-opacity="0.78"/>
      <stop offset="0.78" stop-color="#151110" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#151110" stop-opacity="0.76"/>
    </linearGradient>
    <linearGradient id="bottomShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#151110" stop-opacity="0"/>
      <stop offset="1" stop-color="#151110" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#dbead9" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <clipPath id="mainPhoneClip">
      <rect x="800" y="64" width="232" height="522" rx="32" ry="32"/>
    </clipPath>
    <clipPath id="leftPhoneClip">
      <rect x="646" y="144" width="188" height="422" rx="28" ry="28"/>
    </clipPath>
    <clipPath id="rightPhoneClip">
      <rect x="1000" y="130" width="190" height="427" rx="28" ry="28"/>
    </clipPath>
    <clipPath id="iconClip">
      <rect x="74" y="74" width="70" height="70" rx="18" ry="18"/>
    </clipPath>
  </defs>

  <rect width="1280" height="640" fill="#171313"/>
  <image href="assets/book-cover-hero.png" x="0" y="0" width="1280" height="640" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1280" height="640" fill="url(#heroShade)"/>
  <rect width="1280" height="640" fill="url(#bottomShade)"/>

  <rect x="608" y="54" width="614" height="548" rx="52" fill="url(#panelFill)" stroke="#fffdf8" stroke-opacity="0.12"/>
  <path d="M602 529C697 476 818 475 965 527C1044 555 1131 556 1226 531V640H602Z" fill="#dbead9" opacity="0.08"/>

  <g filter="url(#cardShadow)" opacity="0.94" transform="rotate(-7 740 355)">
    <rect x="640" y="138" width="200" height="434" rx="33" fill="#211d1c"/>
    <image href="assets/appScreens/author-search.png" x="646" y="144" width="188" height="422" preserveAspectRatio="xMidYMid slice" clip-path="url(#leftPhoneClip)"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="792" y="56" width="248" height="538" rx="38" fill="#211d1c"/>
    <image href="assets/appScreens/now-playing.png" x="800" y="64" width="232" height="522" preserveAspectRatio="xMidYMid slice" clip-path="url(#mainPhoneClip)"/>
    <rect x="800" y="64" width="232" height="522" rx="32" fill="none" stroke="#fffdf8" stroke-opacity="0.2" stroke-width="1.5"/>
  </g>

  <g filter="url(#cardShadow)" opacity="0.94" transform="rotate(6 1095 343)">
    <rect x="994" y="124" width="202" height="439" rx="33" fill="#211d1c"/>
    <image href="assets/appScreens/casting.png" x="1000" y="130" width="190" height="427" preserveAspectRatio="xMidYMid slice" clip-path="url(#rightPhoneClip)"/>
  </g>

  <g>
    <rect x="72" y="72" width="74" height="74" rx="20" fill="#dbead9"/>
    <image href="google-play/play-store-icon.png" x="74" y="74" width="70" height="70" preserveAspectRatio="xMidYMid slice" clip-path="url(#iconClip)"/>
    <text x="164" y="119" fill="#fffdf8" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="30" font-weight="760">LibriVox Mobile</text>
  </g>

  <text x="72" y="252" fill="#fffdf8" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="84" font-weight="820" letter-spacing="0">
    <tspan x="72" dy="0">LibriVox</tspan>
    <tspan x="72" dy="86">Mobile</tspan>
  </text>

  <text x="76" y="420" fill="#fffdf8" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="33" font-weight="720">
    <tspan x="76" dy="0">Stream and cast LibriVox audiobooks.</tspan>
    <tspan x="76" dy="44">Completely free.</tspan>
  </text>
  <line x1="76" y1="474" x2="310" y2="474" stroke="#fffdf8" stroke-width="4" stroke-linecap="round" opacity="0.92"/>

  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="21" font-weight="700">
    <rect x="74" y="530" width="112" height="44" rx="22" fill="#dbead9"/>
    <text x="130" y="559" text-anchor="middle" fill="#171313">No ads</text>
    <rect x="198" y="530" width="150" height="44" rx="22" fill="#fffdf8" fill-opacity="0.94"/>
    <text x="273" y="559" text-anchor="middle" fill="#171313">No paywalls</text>
    <rect x="360" y="530" width="172" height="44" rx="22" fill="#fffdf8" fill-opacity="0.82"/>
    <text x="446" y="559" text-anchor="middle" fill="#171313">No account</text>
  </g>
</svg>
