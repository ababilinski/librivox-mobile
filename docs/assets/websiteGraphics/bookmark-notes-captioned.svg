  <text x="540" y="118" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="66" font-weight="760" fill="#004F59">Bookmarks</text>
<text x="540" y="192" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="66" font-weight="760" fill="#004F59">with notes</text>
  <text x="540" y="286" text-anchor="middle" font-family="Inter, Arial, Helvetica, sans-serif" font-size="28" font-weight="520" fill="#315F65">Save the moments you want to return to later.</text>
