  <rect x="208" y="359" width="664" height="1478" rx="50" fill="#111111"/>
  <image x="213" y="364" width="654" height="1468" href="../../image-resources/ui-captures/14-player-bookmark-notes.png" preserveAspectRatio="xMidYMid meet" clip-path="url(#screenClip)"/>
