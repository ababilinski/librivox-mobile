<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
    <defs>
        
        <linearGradient id="background" x1="0" y1="0" x2="0" y2="500" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#E9FFFD"/>
            <stop offset="1" stop-color="#D5F3F1"/>
        </linearGradient>
        <filter id="phoneShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#003F46" flood-opacity="0.28"/>
        </filter>
        <clipPath id="phone-discover"><rect x="452" y="44" width="185" height="416" rx="28" ry="28"/></clipPath><clipPath id="phone-detail"><rect x="618" y="24" width="201" height="452" rx="28" ry="28"/></clipPath><clipPath id="phone-player"><rect x="806" y="54" width="177" height="398" rx="28" ry="28"/></clipPath>
    </defs>
    <rect width="1024" height="500" fill="url(#background)"/>
    <rect x="402" y="24" width="598" height="452" rx="44" fill="#BFE9E6"/>
    <rect x="422" y="44" width="558" height="412" rx="36" fill="none" stroke="#78C8C5" stroke-width="2"/>
    <text x="54" y="148" fill="#004F59" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700">
        <tspan x="54" dy="0">LibriVox</tspan><tspan x="54" dy="58">Mobile</tspan>
    </text>
    <text x="58" y="274" fill="#006973" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="400">
        <tspan x="58" dy="0">Listen to LibriVox</tspan><tspan x="58" dy="34">audiobooks on the go</tspan>
    </text>
    <rect x="58" y="374" width="196" height="46" rx="23" fill="#007986"/>
    <text x="156" y="398" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" text-anchor="middle" dominant-baseline="middle">Listen anywhere</text>
    
            <g>
                <rect x="448" y="40" width="193" height="424" rx="33" fill="#005965" filter="url(#phoneShadow)"/>
                <image x="452" y="44" width="185" height="416" preserveAspectRatio="none" clip-path="url(#phone-discover)" href="../screenshots/04-discover.png"/>
            </g>
            
            <g>
                <rect x="614" y="20" width="209" height="460" rx="33" fill="#005965" filter="url(#phoneShadow)"/>
                <image x="618" y="24" width="201" height="452" preserveAspectRatio="none" clip-path="url(#phone-detail)" href="../screenshots/05-book-detail.png"/>
            </g>
            
            <g>
                <rect x="802" y="50" width="185" height="406" rx="33" fill="#005965" filter="url(#phoneShadow)"/>
                <image x="806" y="54" width="177" height="398" preserveAspectRatio="none" clip-path="url(#phone-player)" href="../screenshots/07-player.png"/>
            </g>
            
</svg>
