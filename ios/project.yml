name: LibriVoxMobile
options:
  bundleIdPrefix: com.ababilinski
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  LibriVoxMobile:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: LibriVoxMobile
    dependencies:
      - package: LibriVoxCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ababilinski.librivoxmobile
        INFOPLIST_FILE: LibriVoxMobile/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
packages:
  LibriVoxCore:
    path: LibriVoxCore
